name: Deploy to Heroku (Docker)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HEROKU_APP_NAME: airline-passenger-satisfaction

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: echo "$HEROKU_API_KEY" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t registry.heroku.com/${HEROKU_APP_NAME}/web .

      - name: Push Docker image
        run: docker push registry.heroku.com/${HEROKU_APP_NAME}/web

      - name: Release on Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release web --app ${HEROKU_APP_NAME}

      - name: Ensure dyno is running
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku ps:scale web=1 --app ${HEROKU_APP_NAME}
